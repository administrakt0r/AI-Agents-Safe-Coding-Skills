<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0f19"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0b0f19"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="titleText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="50%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <circle cx="60" cy="60" r="1.5" fill="#6366f1"/>
    <circle cx="180" cy="120" r="1" fill="#6366f1"/>
    <circle cx="300" cy="60" r="1.5" fill="#a855f7"/>
    <circle cx="420" cy="180" r="1" fill="#a855f7"/>
    <circle cx="540" cy="90" r="1.5" fill="#6366f1"/>
    <circle cx="660" cy="240" r="1" fill="#6366f1"/>
    <circle cx="780" cy="60" r="1.5" fill="#a855f7"/>
    <circle cx="900" cy="160" r="1" fill="#a855f7"/>
    <circle cx="1020" cy="80" r="1.5" fill="#6366f1"/>
    <circle cx="1140" cy="200" r="1" fill="#a855f7"/>
    <circle cx="120" cy="280" r="1" fill="#6366f1"/>
    <circle cx="360" cy="300" r="1.5" fill="#a855f7"/>
    <circle cx="600" cy="320" r="1" fill="#6366f1"/>
    <circle cx="840" cy="280" r="1.5" fill="#a855f7"/>
    <circle cx="1080" cy="300" r="1" fill="#6366f1"/>
  </g>

  <!-- Terminal window art -->
  <g transform="translate(60, 40)">
    <rect x="0" y="0" width="300" height="200" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <circle cx="16" cy="16" r="5" fill="#ef4444" opacity="0.6"/>
    <circle cx="32" cy="16" r="5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="48" cy="16" r="5" fill="#22c55e" opacity="0.6"/>
    <text x="16" y="48" font-family="monospace" font-size="11" fill="#64748b">$ prompt --load skills</text>
    <text x="16" y="68" font-family="monospace" font-size="11" fill="#22c55e">✓ Loading from GitHub repository...</text>
    <text x="16" y="88" font-family="monospace" font-size="11" fill="#22c55e">✓ 1,300+ skills indexed</text>
    <text x="16" y="108" font-family="monospace" font-size="11" fill="#a855f7">→ Agent ready. Skills active.</text>
    <text x="16" y="136" font-family="monospace" font-size="11" fill="#64748b">$ </text>
    <text x="28" y="136" font-family="monospace" font-size="11" fill="#e2e8f0" opacity="0.7">Use @brainstorming</text>
    <text x="28" y="156" font-family="monospace" font-size="11" fill="#64748b">to plan my SaaS MVP</text>
    <text x="16" y="184" font-family="monospace" font-size="9" fill="#475569" font-style="italic">// Just copy-paste. That's it.</text>
  </g>

  <!-- Right side: prompt syntax cards -->
  <g transform="translate(420, 45)">
    <rect x="0" y="0" width="340" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5" opacity="0.7"/>
    <text x="16" y="22" font-family="monospace" font-size="10" fill="#6366f1" font-weight="bold">CLAUDE CODE</text>
    <text x="16" y="40" font-family="monospace" font-size="13" fill="#e2e8f0">Use @brainstorming to plan...</text>

    <rect x="0" y="64" width="340" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5" opacity="0.7"/>
    <text x="16" y="86" font-family="monospace" font-size="10" fill="#f97316" font-weight="bold">CURSOR</text>
    <text x="16" y="104" font-family="monospace" font-size="13" fill="#e2e8f0">@brainstorming plan my SaaS MVP</text>

    <rect x="0" y="128" width="340" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5" opacity="0.7"/>
    <text x="16" y="150" font-family="monospace" font-size="10" fill="#22c55e" font-weight="bold">ANY AGENT</text>
    <text x="16" y="168" font-family="monospace" font-size="13" fill="#e2e8f0">Use the skill "brainstorming" to...</text>
  </g>

  <!-- Title -->
  <g transform="translate(820, 50)">
    <text font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="url(#titleText)">
      AI Agents Safe
    </text>
    <text y="36" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="url(#titleText)">
      Coding Skills
    </text>
    <text y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748b">
      1,300+ agentic playbooks
    </text>
  </g>

  <!-- URL bar -->
  <g transform="translate(820, 120)">
    <rect x="0" y="-14" width="320" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="0" y="5" font-family="monospace" font-size="11" fill="#6366f1">github.com/</text>
    <text x="82" y="5" font-family="monospace" font-size="11" fill="#a855f7" font-weight="bold">administrakt0r</text>
    <text x="194" y="5" font-family="monospace" font-size="11" fill="#64748b">/AI-Agents-Safe-Coding-Skills</text>
  </g>

  <!-- Bottom tagline -->
  <g transform="translate(820, 190)">
    <text font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="url(#accent1)">
      Agent Prompt Ready
    </text>
  </g>

  <!-- Feature badges row -->
  <g transform="translate(820, 235)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="16" y="17" font-family="system-ui,sans-serif" font-size="10" fill="#a855f7">🚀 Plan</text>

    <rect x="110" y="0" width="100" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="16" y="17" font-family="system-ui,sans-serif" font-size="10" fill="#6366f1">🛡️ Security</text>

    <rect x="220" y="0" width="100" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="16" y="17" font-family="system-ui,sans-serif" font-size="10" fill="#06b6d4">🧪 Test</text>
  </g>

  <!-- Side decorative line -->
  <line x1="790" y1="30" x2="790" y2="330" stroke="#334155" stroke-width="1" opacity="0.3"/>
  <circle cx="790" cy="30" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="790" cy="180" r="3" fill="#a855f7" opacity="0.5"/>
  <circle cx="790" cy="330" r="3" fill="#6366f1" opacity="0.5"/>
</svg>
